services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ecommerce_monorepo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_monorepo"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/ecommerce_monorepo
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/ecommerce_monorepo
    ports:
      - "3000:3000"
    restart: unless-stopped

  frontend:
    environment:
      API_PROXY_TARGET: ${{ secrets.API_PROXY_TARGET }}
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "3001:3000"
    restart: unless-stopped

volumes:
  pgdata: