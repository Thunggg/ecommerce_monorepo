name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      API_PROXY_TARGET: ${{ secrets.API_PROXY_TARGET }}
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Set NX base/head
        run: |
          git fetch --no-tags --prune --depth=1 origin main
          echo "NX_BASE=origin/main" >> "$GITHUB_ENV"
          echo "NX_HEAD=HEAD" >> "$GITHUB_ENV"

      - run: pnpm nx affected -t lint,typecheck,test,build --base="$NX_BASE" --head="$NX_HEAD" --parallel=3

      - run: pnpm nx fix-ci
        if: always()

  e2e:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: checks
    env:
      API_PROXY_TARGET: ${{ secrets.API_PROXY_TARGET }}
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Set NX base/head
        run: |
          git fetch --no-tags --prune --depth=1 origin main
          echo "NX_BASE=origin/main" >> "$GITHUB_ENV"
          echo "NX_HEAD=HEAD" >> "$GITHUB_ENV"

      # Run e2e separately to avoid long CI hangs
      - run: pnpm nx affected -t e2e --base="$NX_BASE" --head="$NX_HEAD" --parallel=1

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: checks
    env:
      DB_PASSWORD: ci_dummy_password
      API_PROXY_TARGET: ${{ secrets.API_PROXY_TARGET }}
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Validate docker compose file
        run: docker compose config

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image (cached)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          target: runtime
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (cached)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: false
          build-args: |
            API_PROXY_TARGET=${{ env.API_PROXY_TARGET }}
          cache-from: type=gha
          cache-to: type=gha,mode=max