name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      API_PROXY_TARGET: http://localhost:3000/api
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Nx Cloud optional: keep if your workspace is connected
      - run: pnpm nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="e2e"

      - run: pnpm nx record -- pnpm nx format:check --base="remotes/origin/main"
      - run: pnpm nx run-many -t lint test build typecheck

      - run: pnpm nx fix-ci
        if: always()

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: checks
    env:
      API_PROXY_TARGET: http://localhost:3000/api
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Run e2e separately to avoid long run-many hangs
      - run: pnpm nx run-many -t e2e --parallel=1